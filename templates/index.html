<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動打卡與排班管理</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #1a73e8;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        p.subtitle {
            color: #5f6368;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 200px;
        }
        .btn-primary {
            background-color: #1a73e8;
            color: white;
            border: 2px solid #1a73e8;
        }
        .btn-primary:hover {
            background-color: #1557b0;
            border-color: #1557b0;
        }
        .btn-outline {
            background-color: white;
            color: #1a73e8;
            border: 2px solid #1a73e8;
        }
        .btn-outline:hover {
            background-color: #f8f9fa;
        }
        .footer-note {
            margin-top: 40px;
            font-size: 14px;
            color: #9aa0a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>行動打卡與排班管理</h1>
        <p class="subtitle">告別紙本打卡鐘，智慧化處理人事排班與交接日誌，提升店鋪營運效率。</p>
        
        <div class="btn-group">
            <a href="/clockin" class="btn btn-outline">進入員工打卡前台</a>
            <a href="/dashboard" class="btn btn-primary">進入店長管理後台</a>
        </div>
        
        <div class="footer-note">
            期末專案系統測試・已成功連線至雲端伺服器
        </div>
    </div>
</body>
</html>
