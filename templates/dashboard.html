<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統後台 - 排班與員工管理</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .dashboard-container { max-width: 900px; margin: 0 auto; }
        .card { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid #1a73e8;}
        h1 { color: #2c3e50; margin-bottom: 30px; text-align: center;}
        h2 { color: #2c3e50; font-size: 20px; margin-top: 0;}
        .btn { padding: 10px 18px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 5px; transition: 0.2s;}
        .btn:hover { background-color: #1557b0; }
        .btn-danger { background-color: #e74c3c; padding: 6px 12px; font-size: 13px; margin-left: 5px; border-radius: 4px;}
        .btn-danger:hover { background-color: #c0392b; }
        .btn-face { background-color: #27ae60; padding: 6px 12px; font-size: 13px; margin-left: auto; border-radius: 4px; color: white; border: none; cursor: pointer;}
        .btn-face:hover { background-color: #219150; }
        .btn-ai { background-color: #8e44ad; }
        .btn-ai:hover { background-color: #732d91; }
        .btn-voice { background-color: #f39c12; }
        .btn-voice:hover { background-color: #d68910; }
        input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit;}
        ul.emp-list { list-style-type: none; padding: 0; margin-bottom: 15px;}
        ul.emp-list li { background: #f8f9fa; margin: 8px 0; padding: 12px 15px; border-radius: 6px; display: flex; align-items: center; border: 1px solid #eee;}
        table.schedule-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px;}
        table.schedule-table th, table.schedule-table td { border: 1px solid #e0e0e0; padding: 12px; text-align: center; }
        table.schedule-table th { background-color: #f8f9fa; color: #333; font-weight: 600;}
        table.schedule-table td[contenteditable="true"]:hover { background-color: #fdfad9; cursor: text; outline: none;}
        .ai-result { background: #f8f9fa; padding: 20px; border-radius: 6px; white-space: pre-wrap; margin-top: 15px; display: none; border-left: 4px solid #8e44ad; line-height: 1.6;}
        
        /* 註冊相機的浮動視窗 */
        #camera-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; border-radius: 10px; text-align: center; }
        #video-register { width: 100%; max-width: 400px; transform: scaleX(-1); border-radius: 8px;}
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>店長營運與人事管理後台</h1>

    <div class="card">
        <h2>員工名單管理 (方案：體驗版 限5人)</h2>
        <ul class="emp-list" id="employee-list">
            {% for emp in employees %}
                <li>
                    <span>👤 {{ emp }} 
                        {% if emp in registered_faces %} <span style="color:#27ae60; font-size:12px;">(已登錄人臉)</span> {% endif %}
                    </span>
                    <button class="btn-face" onclick="openRegisterCamera('{{ emp }}')">📸 登錄人臉</button>
                    <button class="btn btn-danger" onclick="deleteEmployee('{{ emp }}')">刪除</button>
                </li>
            {% endfor %}
        </ul>
        <div style="margin-top: 20px; display: flex;">
            <input type="text" id="new-employee-name" placeholder="輸入新進員工姓名..." style="width: 75%; margin-right: 15px; margin-bottom: 0;">
            <button class="btn" onclick="addEmployee()" style="width: 25%;">新增員工</button>
        </div>
    </div>

    <div class="card">
        <h2>本週手動排班表</h2>
        <table class="schedule-table">
            <thead><tr><th>班別</th><th>星期一</th><th>星期二</th><th>星期三</th><th>星期四</th><th>星期五</th><th>星期六</th><th>星期日</th></tr></thead>
            <tbody>
                <tr><td><strong>早班</strong></td><td contenteditable="true">小王</td><td contenteditable="true"></td><td contenteditable="true">小林</td><td contenteditable="true"></td><td contenteditable="true">小陳</td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
                <tr><td><strong>晚班</strong></td><td contenteditable="true"></td><td contenteditable="true">小李</td><td contenteditable="true"></td><td contenteditable="true">小張</td><td contenteditable="true"></td><td contenteditable="true">小王</td><td contenteditable="true"></td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>AI 排班調度顧問 (OpenAI)</h2>
        <textarea id="ai-prompt-schedule" rows="2" placeholder="例如：小李這週三確診請假..."></textarea>
        <button class="btn btn-ai" onclick="consultAI()">詢問 AI 顧問</button>
        <div id="ai-result-schedule" class="ai-result"></div>
    </div>

    <div class="card">
        <h2>語音交接日誌總結 (OpenAI)</h2>
        <textarea id="ai-prompt-handover" rows="4" placeholder="請輸入語音辨識的口語文字..."></textarea>
        <div style="margin-top: 10px;">
            <button class="btn btn-voice" onclick="simulateVoiceInput()">模擬語音輸入</button>
            <button class="btn btn-ai" onclick="generateHandover()">產生專業交接日誌</button>
        </div>
        <div id="ai-result-handover" class="ai-result"></div>
    </div>
</div>

<div id="camera-modal">
    <h3 id="register-title"></h3>
    <video id="video-register" autoplay playsinline></video>
    <canvas id="canvas-register" style="display:none;"></canvas>
    <div style="margin-top: 15px;">
        <button class="btn btn-face" onclick="captureAndRegister()" style="padding: 10px 20px;">✅ 拍照並儲存</button>
        <button class="btn btn-danger" onclick="closeCamera()">取消</button>
    </div>
</div>

<script>
    // 原本的增刪員工、AI 功能程式碼
    function addEmployee() {
        const nameInput = document.getElementById("new-employee-name").value;
        if (!nameInput) { alert("請輸入員工姓名！"); return; }
        let formData = new FormData(); formData.append("name", nameInput);
        fetch("/add_employee", { method: "POST", body: formData })
        .then(response => response.json())
        .then(data => { if (data.status === "upgrade_needed") alert("💎 方案限制提示 💎\n\n" + data.message); else window.location.reload(); });
    }

    function deleteEmployee(name) {
        if (!confirm(`確定要刪除員工「${name}」嗎？`)) return;
        fetch(`/delete_employee/${name}`, { method: "POST" })
        .then(response => response.json())
        .then(data => { alert(data.message); window.location.reload(); });
    }
    
    // 省略 AI 顧問與語音交接的 JS (保留你原本的內容即可)
    function consultAI() { /* ... */ }
    function simulateVoiceInput() { /* ... */ }
    function generateHandover() { /* ... */ }

    // --- 新增：登錄人臉邏輯 ---
    let registerStream = null;
    let currentRegisterName = "";

    function openRegisterCamera(name) {
        currentRegisterName = name;
        document.getElementById("register-title").innerText = `為「${name}」登錄人臉`;
        document.getElementById("camera-modal").style.display = "block";
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { registerStream = stream; document.getElementById("video-register").srcObject = stream; })
            .catch(err => { alert("無法開啟相機，請確認權限。"); closeCamera(); });
    }

    function closeCamera() {
        document.getElementById("camera-modal").style.display = "none";
        if (registerStream) registerStream.getTracks().forEach(track => track.stop());
    }

    function captureAndRegister() {
        const video = document.getElementById("video-register");
        const canvas = document.getElementById("canvas-register");
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // 將圖片轉為 Base64 格式
        const base64Image = canvas.toDataURL("image/jpeg");
        closeCamera();

        let formData = new FormData();
        formData.append("name", currentRegisterName);
        formData.append("image", base64Image);

        fetch("/register_face", { method: "POST", body: formData })
        .then(response => response.json())
        .then(data => { alert(data.message); window.location.reload(); });
    }
</script>
</body>
</html>
