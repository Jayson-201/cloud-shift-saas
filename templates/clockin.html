<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工行動打卡 (AI 辨識版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;}
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); max-width: 400px; width: 100%; box-sizing: border-box;}
        h2 { color: #1a73e8; margin-top: 0; margin-bottom: 20px; font-size: 24px;}
        select { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #dcdcdc; font-size: 16px; background-color: #f8f9fa; outline: none;}
        
        #camera-container { display: none; margin-bottom: 20px; position: relative; border-radius: 8px; overflow: hidden; border: 3px solid #ddd;}
        #video-feed { width: 100%; display: block; transform: scaleX(-1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background-color: #27ae60; box-shadow: 0 0 10px #27ae60; animation: scan 2s infinite; display: none;}
        @keyframes scan { 0% { top: 0; } 50% { top: 95%; } 100% { top: 0; } }

        .btn-action { background-color: #1a73e8; color: white; padding: 16px; width: 100%; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px;}
        .btn-action:hover { background-color: #1557b0; }
        .btn-action:disabled { background-color: #9aa0a6; cursor: not-allowed; }
        #btn-capture { display: none; background-color: #e67e22; }
        
        #status-msg { margin-top: 15px; font-weight: 500; color: #e74c3c; font-size: 15px; line-height: 1.5; white-space: pre-wrap;}
        .success-msg { color: #27ae60 !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>員工行動打卡</h2>
    
    <select id="emp-select">
        <option value="">-- 請先選擇您的姓名 --</option>
        {% for emp in employees %}
            <option value="{{ emp }}">{{ emp }}</option>
        {% endfor %}
    </select>

    <div id="camera-container">
        <video id="video-feed" autoplay playsinline></video>
        <div id="scan-line" class="scan-line"></div>
    </div>
    
    <canvas id="canvas-feed" style="display:none;"></canvas>

    <button id="btn-start" class="btn-action" onclick="startCamera()">📷 開啟相機進行辨識</button>
    <button id="btn-capture" class="btn-action" onclick="captureAndVerify()">✅ 拍攝並進行 AI 比對</button>

    <p id="status-msg"></p>
    
    <div style="margin-top: 20px;">
        <a href="/" style="color: #1a73e8; text-decoration: none; font-size: 14px;">返回系統首頁</a>
    </div>
</div>

<script>
let videoStream = null;

function startCamera() {
    const empName = document.getElementById("emp-select").value;
    const statusMsg = document.getElementById("status-msg");
    if (!empName) { statusMsg.innerText = "請先選擇員工姓名！"; return; }

    statusMsg.innerText = "正在開啟相機...";
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            videoStream = stream;
            document.getElementById("camera-container").style.display = "block";
            document.getElementById("video-feed").srcObject = stream;
            document.getElementById("btn-start").style.display = "none";
            document.getElementById("btn-capture").style.display = "block";
            statusMsg.innerText = "請將臉部對準鏡頭，然後按下拍攝。";
        })
        .catch(err => { statusMsg.innerText = "❌ 無法存取相機，請確認權限！"; });
}

function captureAndVerify() {
    const empName = document.getElementById("emp-select").value;
    const statusMsg = document.getElementById("status-msg");
    const btnCapture = document.getElementById("btn-capture");
    const video = document.getElementById("video-feed");
    const canvas = document.getElementById("canvas-feed");

    // 擷取 Base64 圖片
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
    const currentBase64 = canvas.toDataURL("image/jpeg");

    video.pause();
    document.getElementById("scan-line").style.display = "block";
    btnCapture.disabled = true;
    btnCapture.innerText = "🔄 AI 人臉比對中...";
    statusMsg.className = "";
    statusMsg.innerText = "正在傳送照片給 OpenAI 進行防偽特徵比對...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                if(videoStream) videoStream.getTracks().forEach(track => track.stop());
                document.getElementById("scan-line").style.display = "none";

                let formData = new FormData();
                formData.append("name", empName);
                formData.append("lat", position.coords.latitude);
                formData.append("lng", position.coords.longitude);
                formData.append("image", currentBase64); // 傳送照片

                fetch("/api/do_clockin", { method: "POST", body: formData })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        btnCapture.innerText = "🎉 打卡完成";
                        btnCapture.style.backgroundColor = "#27ae60";
                        statusMsg.classList.add("success-msg");
                    } else {
                        btnCapture.innerText = "❌ 打卡失敗";
                        btnCapture.style.backgroundColor = "#e74c3c";
                    }
                    statusMsg.innerText = data.message;
                });
            },
            (error) => {
                statusMsg.innerText = "❌ 無法獲取 GPS 定位，打卡失敗。";
                btnCapture.innerText = "❌ 定位失敗";
                document.getElementById("scan-line").style.display = "none";
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    } else {
        statusMsg.innerText = "您的設備不支援 GPS 定位。";
    }
}
</script>

</body>
</html>
